{% extends "web/base.html" %}

{% block title %}总结资讯 - 微博热搜交易信号分析器{% endblock %}

{% block extra_css %}
<style>
    .summary-card {
        border-left: 4px solid #667eea;
        background: #f8f9fa;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 0 8px 8px 0;
    }
    
    .persistent-tag {
        background: #d1fae5;
        color: #065f46;
        font-size: 0.75rem;
        padding: 2px 8px;
        border-radius: 4px;
    }
    
    .sustained-tag {
        background: #dbeafe;
        color: #1e40af;
        font-size: 0.75rem;
        padding: 2px 8px;
        border-radius: 4px;
    }
    
    .heat-trend-up {
        color: #10b981;
    }
    
    .heat-trend-down {
        color: #ef4444;
    }
    
    .heat-trend-stable {
        color: #6b7280;
    }
</style>
{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-journal-text me-2"></i>热门话题总结资讯
            </div>
            <div class="card-body">
                <ul class="nav nav-tabs mb-3" id="summaryTabs">
                    <li class="nav-item">
                        <a class="nav-link active" data-bs-toggle="tab" href="#dailyTab">
                            <i class="bi bi-calendar-day me-1"></i>每日总结
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-bs-toggle="tab" href="#weeklyTab">
                            <i class="bi bi-calendar-week me-1"></i>每周总结
                        </a>
                    </li>
                </ul>
                
                <div class="tab-content" id="tabContent">
                    <div class="tab-pane fade show active" id="dailyTab">
                        <div class="row mb-3 align-items-center">
                            <div class="col-md-3">
                                <label class="form-label"><i class="bi bi-calendar me-1"></i>选择日期</label>
                                <input type="date" id="dailyDateSelector" class="form-control">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label d-block">&nbsp;</label>
                                <button class="btn btn-gradient" onclick="loadDailySummary()">
                                    <i class="bi bi-search me-1"></i>查询
                                </button>
                            </div>
                            <div class="col-md-6 text-end">
                                <label class="form-label d-block">&nbsp;</label>
                                <button class="btn btn-success" onclick="runDailySummaryTask()">
                                    <i class="bi bi-play-circle me-1"></i>执行今日总结
                                </button>
                            </div>
                        </div>
                        <div id="dailyContent">
                            <div class="loading-spinner">
                                <div class="spinner-border" role="status"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="tab-pane fade" id="weeklyTab">
                        <div class="row mb-3 align-items-center">
                            <div class="col-md-3">
                                <label class="form-label"><i class="bi bi-calendar3 me-1"></i>周开始日期</label>
                                <input type="date" id="weekStartSelector" class="form-control">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label"><i class="bi bi-calendar3 me-1"></i>周结束日期</label>
                                <input type="date" id="weekEndSelector" class="form-control">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label d-block">&nbsp;</label>
                                <button class="btn btn-gradient" onclick="loadWeeklySummary()">
                                    <i class="bi bi-search me-1"></i>查询
                                </button>
                            </div>
                            <div class="col-md-3 text-end">
                                <label class="form-label d-block">&nbsp;</label>
                                <button class="btn btn-success" onclick="runWeeklySummaryTask()">
                                    <i class="bi bi-play-circle me-1"></i>执行本周总结
                                </button>
                            </div>
                        </div>
                        <div id="weeklyContent">
                            <div class="loading-spinner">
                                <div class="spinner-border" role="status"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function initDateSelectors() {
    const today = new Date();
    const yesterday = new Date(today);
    yesterday.setDate(yesterday.getDate() - 1);
    
    const dailySelector = document.getElementById('dailyDateSelector');
    dailySelector.value = yesterday.toISOString().split('T')[0];
    dailySelector.max = today.toISOString().split('T')[0];
    
    const weekday = today.getDay();
    const weekEnd = new Date(today);
    weekEnd.setDate(today.getDate() - (weekday === 0 ? 7 : weekday));
    
    const weekStart = new Date(weekEnd);
    weekStart.setDate(weekEnd.getDate() - 6);
    
    document.getElementById('weekStartSelector').value = weekStart.toISOString().split('T')[0];
    document.getElementById('weekEndSelector').value = weekEnd.toISOString().split('T')[0];
}

async function loadDailySummary() {
    const date = document.getElementById('dailyDateSelector').value;
    const container = document.getElementById('dailyContent');
    
    container.innerHTML = '<div class="loading-spinner"><div class="spinner-border" role="status"></div></div>';
    
    try {
        const data = await apiCall(`/api/daily-summary?date=${date}`);
        renderDailySummary(data);
    } catch (error) {
        console.error('加载每日总结失败:', error);
        container.innerHTML = '<div class="text-center text-danger py-4">加载数据失败</div>';
    }
}

async function loadWeeklySummary() {
    const weekStart = document.getElementById('weekStartSelector').value;
    const weekEnd = document.getElementById('weekEndSelector').value;
    const container = document.getElementById('weeklyContent');
    
    container.innerHTML = '<div class="loading-spinner"><div class="spinner-border" role="status"></div></div>';
    
    try {
        const data = await apiCall(`/api/weekly-summary?week_start=${weekStart}&week_end=${weekEnd}`);
        renderWeeklySummary(data);
    } catch (error) {
        console.error('加载每周总结失败:', error);
        container.innerHTML = '<div class="text-center text-danger py-4">加载数据失败</div>';
    }
}

function renderDailySummary(data) {
    const container = document.getElementById('dailyContent');
    
    if (!data.exists || !data.topics || data.topics.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="bi bi-journal-x"></i>
                <p>暂无 ${data.date} 的每日总结数据</p>
                <p class="text-muted small">请点击上方"执行今日总结"按钮生成</p>
            </div>
        `;
        return;
    }
    
    let html = `
        <div class="alert alert-info mb-4">
            <div class="row">
                <div class="col-md-3">
                    <strong><i class="bi bi-calendar-day me-1"></i>总结日期:</strong> ${data.date}
                </div>
                <div class="col-md-3">
                    <strong><i class="bi bi-database me-1"></i>快照数量:</strong> ${data.total_snapshots || 0}
                </div>
                <div class="col-md-3">
                    <strong><i class="bi bi-fire me-1"></i>话题数量:</strong> ${data.total_topics || 0}
                </div>
                <div class="col-md-3">
                    <strong><i class="bi bi-check-circle me-1"></i>状态:</strong> 
                    <span class="text-success">已生成</span>
                </div>
            </div>
        </div>
    `;
    
    if (data.summary_text) {
        html += `
            <div class="summary-box mb-4">
                <h3><i class="bi bi-chat-left-text me-2"></i>AI总结</h3>
                <p class="mb-0">${data.summary_text}</p>
            </div>
        `;
    }
    
    html += `
        <h5 class="mb-3"><i class="bi bi-list-ol me-2"></i>热门话题列表</h5>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th style="width: 80px;">排名</th>
                        <th>话题标题</th>
                        <th style="width: 100px;">出现次数</th>
                        <th style="width: 100px;">最佳排名</th>
                        <th style="width: 120px;">平均热度</th>
                        <th style="width: 120px;">最高热度</th>
                        <th style="width: 100px;">标签</th>
                    </tr>
                </thead>
                <tbody>
    `;
    
    data.topics.forEach(topic => {
        const badgeClass = topic.rank <= 3 ? 'rank-top-3' : 'rank-other';
        const persistentTag = topic.is_persistent ? '<span class="persistent-tag">持久话题</span>' : '';
        
        html += `
            <tr>
                <td><span class="rank-badge ${badgeClass}">${topic.rank}</span></td>
                <td>
                    <div class="d-flex align-items-center">
                        <span>${topic.title}</span>
                        ${persistentTag ? `<span class="ms-2">${persistentTag}</span>` : ''}
                    </div>
                    ${topic.persistence_reason ? `<small class="text-muted">${topic.persistence_reason}</small>` : ''}
                </td>
                <td><strong>${topic.appear_count}</strong>次</td>
                <td>第${topic.best_rank || '-'}名</td>
                <td>${formatHotValue(topic.avg_hot_value)}</td>
                <td>${formatHotValue(topic.max_hot_value)}</td>
                <td>${persistentTag || '-'}</td>
            </tr>
        `;
    });
    
    html += `
                </tbody>
            </table>
        </div>
    `;
    
    container.innerHTML = html;
}

function renderWeeklySummary(data) {
    const container = document.getElementById('weeklyContent');
    
    if (!data.exists || !data.topics || data.topics.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="bi bi-journal-x"></i>
                <p>暂无 ${data.week_start} 至 ${data.week_end} 的每周总结数据</p>
                <p class="text-muted small">请点击上方"执行本周总结"按钮生成</p>
            </div>
        `;
        return;
    }
    
    let html = `
        <div class="alert alert-info mb-4">
            <div class="row">
                <div class="col-md-4">
                    <strong><i class="bi bi-calendar-week me-1"></i>总结周期:</strong> 
                    ${data.week_start_date} 至 ${data.week_end_date}
                </div>
                <div class="col-md-3">
                    <strong><i class="bi bi-journal me-1"></i>每日总结:</strong> ${data.total_daily_summaries || 0}天
                </div>
                <div class="col-md-3">
                    <strong><i class="bi bi-fire me-1"></i>话题数量:</strong> ${data.total_topics || 0}
                </div>
                <div class="col-md-2">
                    <strong><i class="bi bi-check-circle me-1"></i>状态:</strong> 
                    <span class="text-success">已生成</span>
                </div>
            </div>
        </div>
    `;
    
    if (data.summary_text) {
        html += `
            <div class="summary-box mb-4">
                <h3><i class="bi bi-chat-left-text me-2"></i>AI总结</h3>
                <p class="mb-0">${data.summary_text}</p>
            </div>
        `;
    }
    
    html += `
        <h5 class="mb-3"><i class="bi bi-list-ol me-2"></i>热门话题列表</h5>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th style="width: 80px;">排名</th>
                        <th>话题标题</th>
                        <th style="width: 100px;">出现天数</th>
                        <th style="width: 120px;">热度趋势</th>
                        <th style="width: 100px;">标签</th>
                        <th style="width: 120px;">首次出现</th>
                        <th style="width: 120px;">最后出现</th>
                    </tr>
                </thead>
                <tbody>
    `;
    
    data.topics.forEach(topic => {
        const badgeClass = topic.rank <= 3 ? 'rank-top-3' : 'rank-other';
        const sustainedTag = topic.is_sustained ? '<span class="sustained-tag">持续话题</span>' : '';
        
        let trendClass = 'heat-trend-stable';
        let trendIcon = 'bi-dash';
        if (topic.heat_trend) {
            if (topic.heat_trend.includes('上升') || topic.heat_trend.includes('增长')) {
                trendClass = 'heat-trend-up';
                trendIcon = 'bi-arrow-up';
            } else if (topic.heat_trend.includes('下降') || topic.heat_trend.includes('减少')) {
                trendClass = 'heat-trend-down';
                trendIcon = 'bi-arrow-down';
            }
        }
        
        html += `
            <tr>
                <td><span class="rank-badge ${badgeClass}">${topic.rank}</span></td>
                <td>
                    <div class="d-flex align-items-center">
                        <span>${topic.title}</span>
                        ${sustainedTag ? `<span class="ms-2">${sustainedTag}</span>` : ''}
                    </div>
                    ${topic.sustained_reason ? `<small class="text-muted">${topic.sustained_reason}</small>` : ''}
                </td>
                <td><strong>${topic.appear_days}</strong>天</td>
                <td>
                    <span class="${trendClass}">
                        <i class="bi ${trendIcon} me-1"></i>
                        ${topic.heat_trend || '稳定'}
                    </span>
                </td>
                <td>${sustainedTag || '-'}</td>
                <td>${topic.first_appear_date || '-'}</td>
                <td>${topic.last_appear_date || '-'}</td>
            </tr>
        `;
        
        if (topic.heat_evolution) {
            html += `
                <tr>
                    <td colspan="7">
                        <div class="summary-box p-3 mb-0">
                            <small><strong>热度演变分析:</strong> ${topic.heat_evolution}</small>
                        </div>
                    </td>
                </tr>
            `;
        }
    });
    
    html += `
                </tbody>
            </table>
        </div>
    `;
    
    container.innerHTML = html;
}

function formatHotValue(value) {
    if (!value) return '-';
    if (value >= 10000) {
        return (value / 10000).toFixed(0) + '万';
    }
    return value.toFixed(0);
}

async function runDailySummaryTask() {
    if (!confirm('确定要执行每日总结任务吗？这可能需要一些时间。')) {
        return;
    }
    
    try {
        const result = await apiCall('/api/task/run', {
            method: 'POST',
            body: JSON.stringify({ type: 'daily_summary' })
        });
        
        if (result.success) {
            alert('每日总结任务执行成功！');
            loadDailySummary();
        } else {
            alert('每日总结任务执行失败: ' + (result.error || '未知错误'));
        }
    } catch (error) {
        console.error('执行任务失败:', error);
        alert('执行任务失败: ' + error.message);
    }
}

async function runWeeklySummaryTask() {
    if (!confirm('确定要执行每周总结任务吗？这可能需要一些时间。')) {
        return;
    }
    
    try {
        const result = await apiCall('/api/task/run', {
            method: 'POST',
            body: JSON.stringify({ type: 'weekly_summary' })
        });
        
        if (result.success) {
            alert('每周总结任务执行成功！');
            loadWeeklySummary();
        } else {
            alert('每周总结任务执行失败: ' + (result.error || '未知错误'));
        }
    } catch (error) {
        console.error('执行任务失败:', error);
        alert('执行任务失败: ' + error.message);
    }
}

initDateSelectors();
loadDailySummary();
</script>
{% endblock %}
