{% extends "web/base.html" %}

{% block title %}预警列表 - 微博热搜交易信号分析器{% endblock %}

{% block extra_css %}
<style>
    .alert-level-urgent {
        border-left: 4px solid #ef4444 !important;
    }
    .alert-level-important {
        border-left: 4px solid #f59e0b !important;
    }
    .alert-level-normal {
        border-left: 4px solid #3b82f6 !important;
    }
    .alert-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 600;
    }
    .alert-badge-urgent {
        background: #fee2e2;
        color: #991b1b;
    }
    .alert-badge-important {
        background: #fef3c7;
        color: #92400e;
    }
    .alert-badge-normal {
        background: #dbeafe;
        color: #1e40af;
    }
    .alert-item {
        border-left: 4px solid #667eea;
        background: #f8f9fa;
        padding: 15px;
        margin-bottom: 12px;
        border-radius: 0 8px 8px 0;
        transition: all 0.2s ease;
    }
    .alert-item:hover {
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        transform: translateX(2px);
    }
    .stat-card-alert {
        text-align: center;
        padding: 15px;
        border-radius: 8px;
    }
    .stat-urgent { background: #fee2e2; }
    .stat-important { background: #fef3c7; }
    .stat-normal { background: #dbeafe; }
    .filter-card {
        background: #f8f9fa;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 20px;
    }
</style>
{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-exclamation-triangle me-2"></i>预警统计概览</span>
                <button class="btn btn-sm btn-gradient" onclick="refreshStats()">
                    <i class="bi bi-arrow-clockwise me-1"></i>刷新
                </button>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-6 col-md-3 mb-3">
                        <div class="stat-card-alert bg-light">
                            <div class="stat-icon text-primary"><i class="bi bi-graph-up"></i></div>
                            <div class="stat-value" id="statTotal">0</div>
                            <div class="stat-label">总预警数</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3 mb-3">
                        <div class="stat-card-alert stat-urgent">
                            <div class="stat-icon text-danger"><i class="bi bi-fire"></i></div>
                            <div class="stat-value text-danger" id="statUrgent">0</div>
                            <div class="stat-label">紧急预警</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3 mb-3">
                        <div class="stat-card-alert stat-important">
                            <div class="stat-icon text-warning"><i class="bi bi-exclamation-circle"></i></div>
                            <div class="stat-value text-warning" id="statImportant">0</div>
                            <div class="stat-label">重要预警</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3 mb-3">
                        <div class="stat-card-alert stat-normal">
                            <div class="stat-icon text-info"><i class="bi bi-info-circle"></i></div>
                            <div class="stat-value text-primary" id="statNormal">0</div>
                            <div class="stat-label">普通预警</div>
                        </div>
                    </div>
                </div>
                
                <div class="row mt-3">
                    <div class="col-12">
                        <div id="trendChart" style="width: 100%; height: 200px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row mb-4">
    <div class="col-12">
        <div class="filter-card">
            <div class="row align-items-center">
                <div class="col-md-2 mb-2 mb-md-0">
                    <label class="form-label small text-muted mb-1">预警类型</label>
                    <select class="form-select form-select-sm" id="filterType">
                        <option value="">全部类型</option>
                        <option value="new_topic">新上榜话题</option>
                        <option value="rank_surge">排名暴涨</option>
                        <option value="heat_surge">热度爆发</option>
                        <option value="sudden_disappear">突然消失</option>
                        <option value="rank_plunge">排名暴跌</option>
                    </select>
                </div>
                <div class="col-md-2 mb-2 mb-md-0">
                    <label class="form-label small text-muted mb-1">预警级别</label>
                    <select class="form-select form-select-sm" id="filterLevel">
                        <option value="">全部级别</option>
                        <option value="urgent">紧急</option>
                        <option value="important">重要</option>
                        <option value="normal">普通</option>
                    </select>
                </div>
                <div class="col-md-2 mb-2 mb-md-0">
                    <label class="form-label small text-muted mb-1">开始日期</label>
                    <input type="date" class="form-control form-control-sm" id="filterStartDate">
                </div>
                <div class="col-md-2 mb-2 mb-md-0">
                    <label class="form-label small text-muted mb-1">结束日期</label>
                    <input type="date" class="form-control form-control-sm" id="filterEndDate">
                </div>
                <div class="col-md-2 mb-2 mb-md-0">
                    <label class="form-label small text-muted mb-1">关键词</label>
                    <input type="text" class="form-control form-control-sm" id="filterKeyword" placeholder="搜索标题...">
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button class="btn btn-sm btn-gradient me-2" onclick="applyFilters()">
                        <i class="bi bi-funnel me-1"></i>筛选
                    </button>
                    <button class="btn btn-sm btn-outline-secondary" onclick="resetFilters()">
                        <i class="bi bi-x-circle me-1"></i>重置
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-list-ul me-2"></i>预警事件列表</span>
                <div class="d-flex align-items-center">
                    <span class="text-muted me-3" id="alertCountInfo">加载中...</span>
                    <button class="btn btn-sm btn-gradient" onclick="loadAlerts()">
                        <i class="bi bi-arrow-clockwise me-1"></i>刷新
                    </button>
                </div>
            </div>
            <div class="card-body" id="alertListContainer">
                <div class="loading-spinner">
                    <div class="spinner-border" role="status"></div>
                </div>
            </div>
            <div class="card-footer" id="paginationContainer" style="display: none;">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="text-muted small" id="paginationInfo"></span>
                    <div>
                        <button class="btn btn-sm btn-outline-secondary me-2" id="btnPrevPage" onclick="prevPage()">
                            <i class="bi bi-chevron-left me-1"></i>上一页
                        </button>
                        <button class="btn btn-sm btn-outline-secondary" id="btnNextPage" onclick="nextPage()">
                            下一页<i class="bi bi-chevron-right ms-1"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const ALERT_TYPE_NAMES = {
    'new_topic': '新上榜话题',
    'rank_surge': '排名暴涨',
    'heat_surge': '热度爆发',
    'sudden_disappear': '突然消失',
    'rank_plunge': '排名暴跌'
};

const ALERT_LEVEL_NAMES = {
    'urgent': '紧急',
    'important': '重要',
    'normal': '普通'
};

let currentPage = 0;
const pageSize = 20;
let totalCount = 0;
let trendChart = null;

async function loadStats() {
    try {
        const data = await apiCall('/api/alert-stats?days=7');
        
        document.getElementById('statTotal').textContent = data.total_count || 0;
        document.getElementById('statUrgent').textContent = data.by_level?.urgent || 0;
        document.getElementById('statImportant').textContent = data.by_level?.important || 0;
        document.getElementById('statNormal').textContent = data.by_level?.normal || 0;
        
        renderTrendChart(data.by_date || []);
    } catch (error) {
        console.error('加载统计数据失败:', error);
    }
}

function renderTrendChart(dateData) {
    const chartDom = document.getElementById('trendChart');
    if (!chartDom) return;
    
    if (!dateData || dateData.length === 0) {
        chartDom.innerHTML = '<div class="text-center text-muted py-4">暂无趋势数据</div>';
        return;
    }
    
    if (trendChart) {
        trendChart.dispose();
    }
    
    trendChart = echarts.init(chartDom);
    
    const dates = dateData.map(d => d.date);
    const counts = dateData.map(d => d.count);
    
    const option = {
        tooltip: {
            trigger: 'axis'
        },
        grid: {
            left: '3%',
            right: '4%',
            bottom: '3%',
            top: '10%',
            containLabel: true
        },
        xAxis: {
            type: 'category',
            data: dates,
            axisLabel: {
                rotate: 45
            }
        },
        yAxis: {
            type: 'value',
            name: '预警数'
        },
        series: [{
            data: counts,
            type: 'line',
            smooth: true,
            areaStyle: {
                color: {
                    type: 'linear',
                    x: 0, y: 0, x2: 0, y2: 1,
                    colorStops: [
                        { offset: 0, color: 'rgba(102, 126, 234, 0.5)' },
                        { offset: 1, color: 'rgba(102, 126, 234, 0.05)' }
                    ]
                }
            },
            lineStyle: {
                color: '#667eea',
                width: 2
            },
            itemStyle: {
                color: '#667eea'
            }
        }]
    };
    
    trendChart.setOption(option);
}

async function loadAlerts() {
    const container = document.getElementById('alertListContainer');
    container.innerHTML = '<div class="loading-spinner"><div class="spinner-border" role="status"></div></div>';
    
    try {
        const params = new URLSearchParams();
        params.append('limit', pageSize);
        params.append('offset', currentPage * pageSize);
        
        const filterType = document.getElementById('filterType').value;
        const filterLevel = document.getElementById('filterLevel').value;
        const filterStartDate = document.getElementById('filterStartDate').value;
        const filterEndDate = document.getElementById('filterEndDate').value;
        const filterKeyword = document.getElementById('filterKeyword').value;
        
        if (filterType) params.append('type', filterType);
        if (filterLevel) params.append('level', filterLevel);
        if (filterStartDate) params.append('start_date', filterStartDate);
        if (filterEndDate) params.append('end_date', filterEndDate);
        if (filterKeyword) params.append('keyword', filterKeyword);
        
        const data = await apiCall(`/api/alerts?${params.toString()}`);
        
        totalCount = data.total_count || 0;
        renderAlertList(data.alerts || []);
        updatePagination();
        
        document.getElementById('alertCountInfo').textContent = `共 ${totalCount} 条记录`;
    } catch (error) {
        console.error('加载预警列表失败:', error);
        container.innerHTML = '<div class="text-center text-danger py-4">加载数据失败，请稍后重试</div>';
    }
}

function renderAlertList(alerts) {
    const container = document.getElementById('alertListContainer');
    
    if (!alerts || alerts.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><p>暂无预警记录</p></div>';
        return;
    }
    
    let html = '';
    
    alerts.forEach(alert => {
        const levelClass = `alert-level-${alert.alert_level}`;
        const badgeClass = `alert-badge-${alert.alert_level}`;
        const levelName = ALERT_LEVEL_NAMES[alert.alert_level] || alert.alert_level;
        const typeName = ALERT_TYPE_NAMES[alert.alert_type] || alert.alert_type;
        
        let rankInfo = '';
        if (alert.rank_before !== null && alert.rank_after !== null) {
            const change = alert.rank_change || (alert.rank_before - alert.rank_after);
            const changeIcon = change > 0 ? 'bi-arrow-up text-success' : 'bi-arrow-down text-danger';
            rankInfo = `<span class="me-2"><i class="bi ${changeIcon}"></i> ${Math.abs(change)} 名</span>`;
        }
        
        let heatInfo = '';
        if (alert.heat_change_ratio) {
            const changePct = ((alert.heat_change_ratio - 1) * 100).toFixed(1);
            const isUp = alert.heat_change_ratio > 1;
            const heatIcon = isUp ? 'bi-arrow-up text-success' : 'bi-arrow-down text-danger';
            heatInfo = `<span><i class="bi ${heatIcon}"></i> ${isUp ? '+' : ''}${changePct}%</span>`;
        }
        
        html += `
            <div class="alert-item ${levelClass}">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <div>
                        <span class="alert-badge ${badgeClass} me-2">${levelName}</span>
                        <span class="text-muted small">${typeName}</span>
                    </div>
                    <small class="text-muted">${formatDateTime(alert.created_at)}</small>
                </div>
                <h6 class="mb-2">${alert.title}</h6>
                ${alert.details ? `<p class="small text-muted mb-2">${alert.details}</p>` : ''}
                <div class="small text-muted">
                    ${rankInfo}
                    ${heatInfo}
                    ${alert.is_pushed ? '<span class="badge bg-success ms-2">已推送</span>' : ''}
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

function updatePagination() {
    const paginationContainer = document.getElementById('paginationContainer');
    const totalPages = Math.ceil(totalCount / pageSize);
    
    if (totalCount <= pageSize) {
        paginationContainer.style.display = 'none';
        return;
    }
    
    paginationContainer.style.display = 'block';
    
    const startItem = currentPage * pageSize + 1;
    const endItem = Math.min((currentPage + 1) * pageSize, totalCount);
    document.getElementById('paginationInfo').textContent = `显示 ${startItem}-${endItem} 条，共 ${totalCount} 条`;
    
    document.getElementById('btnPrevPage').disabled = currentPage === 0;
    document.getElementById('btnNextPage').disabled = endItem >= totalCount;
}

function prevPage() {
    if (currentPage > 0) {
        currentPage--;
        loadAlerts();
    }
}

function nextPage() {
    const totalPages = Math.ceil(totalCount / pageSize);
    if (currentPage < totalPages - 1) {
        currentPage++;
        loadAlerts();
    }
}

function applyFilters() {
    currentPage = 0;
    loadAlerts();
}

function resetFilters() {
    document.getElementById('filterType').value = '';
    document.getElementById('filterLevel').value = '';
    document.getElementById('filterStartDate').value = '';
    document.getElementById('filterEndDate').value = '';
    document.getElementById('filterKeyword').value = '';
    currentPage = 0;
    loadAlerts();
}

function refreshStats() {
    loadStats();
}

function initDates() {
    const today = new Date();
    const lastWeek = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
    
    document.getElementById('filterEndDate').value = today.toISOString().split('T')[0];
    document.getElementById('filterStartDate').value = lastWeek.toISOString().split('T')[0];
}

loadStats();
loadAlerts();
initDates();

window.addEventListener('resize', () => {
    if (trendChart) {
        trendChart.resize();
    }
});
</script>
{% endblock %}
