{% extends "web/base.html" %}

{% block title %}日内变化 - 微博热搜交易信号分析器{% endblock %}

{% block extra_css %}
<style>
    .date-selector {
        max-width: 200px;
    }
    
    .rank-cell {
        text-align: center;
        font-weight: bold;
    }
    
    .rank-1 { background-color: #fef3c7 !important; color: #d97706; }
    .rank-2 { background-color: #f3f4f6 !important; color: #6b7280; }
    .rank-3 { background-color: #fed7aa !important; color: #c2410c; }
    
    .rank-up { color: #10b981; }
    .rank-down { color: #ef4444; }
    .rank-same { color: #6b7280; }
    
    .tab-content {
        min-height: 500px;
    }
    
    .chart-container-large {
        width: 100%;
        height: 600px;
        min-height: 400px;
    }
</style>
{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-bar-chart-line me-2"></i>日内热搜变化分析</span>
                <div class="d-flex align-items-center">
                    <input type="date" id="dateSelector" class="form-control form-control-sm date-selector me-3">
                    <button class="btn btn-sm btn-gradient" onclick="loadData()">
                        <i class="bi bi-search me-1"></i>查询
                    </button>
                </div>
            </div>
            <div class="card-body">
                <div id="dateInfo" class="alert alert-info mb-3" style="display: none;">
                    <i class="bi bi-info-circle me-2"></i>
                    <span id="dateInfoText"></span>
                </div>
                
                <ul class="nav nav-tabs mb-3" id="analysisTabs">
                    <li class="nav-item">
                        <a class="nav-link active" data-bs-toggle="tab" href="#chartTab">
                            <i class="bi bi-graph-up me-1"></i>趋势图表
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-bs-toggle="tab" href="#tableTab">
                            <i class="bi bi-table me-1"></i>排名表格
                        </a>
                    </li>
                </ul>
                
                <div class="tab-content" id="tabContent">
                    <div class="tab-pane fade show active" id="chartTab">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label"><i class="bi bi-filter me-1"></i>选择热点（按住Ctrl多选）</label>
                                <select id="topicSelector" class="form-select" multiple size="8">
                                    <option value="">加载中...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label"><i class="bi bi-info-circle me-1"></i>操作说明</label>
                                <div class="card bg-light">
                                    <div class="card-body small">
                                        <p class="mb-2"><i class="bi bi-check-circle text-success me-2"></i>图表展示热点在不同时间点的排名变化</p>
                                        <p class="mb-2"><i class="bi bi-check-circle text-success me-2"></i>Y轴为排名，数值越小排名越高</p>
                                        <p class="mb-2"><i class="bi bi-check-circle text-success me-2"></i>可在左侧选择特定热点进行对比</p>
                                        <p class="mb-0"><i class="bi bi-check-circle text-success me-2"></i>鼠标悬停可查看详细信息</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div id="chartContainer" class="chart-container-large border rounded"></div>
                    </div>
                    <div class="tab-pane fade" id="tableTab">
                        <div id="tableContainer">
                            <div class="loading-spinner">
                                <div class="spinner-border" role="status"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let chart = null;
let currentData = null;

function initDateSelector() {
    const today = new Date();
    const dateInput = document.getElementById('dateSelector');
    dateInput.value = today.toISOString().split('T')[0];
    dateInput.max = today.toISOString().split('T')[0];
}

async function loadData() {
    const dateInput = document.getElementById('dateSelector');
    const date = dateInput.value;
    
    if (!date) {
        alert('请选择日期');
        return;
    }
    
    document.getElementById('tableContainer').innerHTML = '<div class="loading-spinner"><div class="spinner-border" role="status"></div></div>';
    
    try {
        currentData = await apiCall(`/api/intraday?date=${date}`);
        renderAll();
    } catch (error) {
        console.error('加载数据失败:', error);
        document.getElementById('tableContainer').innerHTML = '<div class="text-center text-danger py-4">加载数据失败</div>';
        document.getElementById('chartContainer').innerHTML = '<div class="text-center text-danger py-4">加载数据失败</div>';
    }
}

function renderAll() {
    renderDateInfo();
    renderTable();
    renderTopicSelector();
    renderChart();
}

function renderDateInfo() {
    const infoDiv = document.getElementById('dateInfo');
    const infoText = document.getElementById('dateInfoText');
    
    if (!currentData || currentData.snapshot_count === 0) {
        infoDiv.className = 'alert alert-warning mb-3';
        infoText.textContent = `日期: ${currentData?.date || '未知'} - 暂无数据`;
        infoDiv.style.display = 'block';
        return;
    }
    
    infoDiv.className = 'alert alert-info mb-3';
    infoText.textContent = `日期: ${currentData.date} - 共 ${currentData.snapshot_count} 个快照`;
    infoDiv.style.display = 'block';
}

function renderTable() {
    const container = document.getElementById('tableContainer');
    
    if (!currentData || !currentData.table_data || currentData.table_data.time_points.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="bi bi-table"></i><p>暂无日内数据</p></div>';
        return;
    }
    
    const tableData = currentData.table_data;
    const timePoints = tableData.time_points;
    const titles = tableData.title_columns;
    const matrix = tableData.rank_matrix;
    
    let html = '<div class="table-responsive"><table class="table table-hover table-sm">';
    
    html += '<thead><tr><th style="position: sticky; left: 0; background: white; z-index: 10;">时间点</th>';
    titles.forEach((title, idx) => {
        html += `<th style="min-width: 150px;">${idx + 1}. ${title}</th>`;
    });
    html += '</tr></thead><tbody>';
    
    timePoints.forEach((time, rowIdx) => {
        html += `<tr><td style="position: sticky; left: 0; background: white; z-index: 10; font-weight: 600;">${time}</td>`;
        
        matrix[rowIdx].forEach((rank, colIdx) => {
            let cellClass = 'rank-cell';
            let cellContent = '-';
            let changeIndicator = '';
            
            if (rank !== null) {
                cellContent = rank;
                if (rank === 1) cellClass += ' rank-1';
                else if (rank === 2) cellClass += ' rank-2';
                else if (rank === 3) cellClass += ' rank-3';
                
                if (rowIdx > 0) {
                    const prevRank = matrix[rowIdx - 1][colIdx];
                    if (prevRank !== null && rank !== null) {
                        if (rank < prevRank) {
                            changeIndicator = ' <i class="bi bi-arrow-up rank-up"></i>';
                        } else if (rank > prevRank) {
                            changeIndicator = ' <i class="bi bi-arrow-down rank-down"></i>';
                        } else {
                            changeIndicator = ' <i class="bi bi-dash rank-same"></i>';
                        }
                    }
                }
            }
            
            html += `<td class="${cellClass}">${cellContent}${changeIndicator}</td>`;
        });
        
        html += '</tr>';
    });
    
    html += '</tbody></table></div>';
    
    html += `<div class="mt-3 small text-muted">
        <i class="bi bi-info-circle me-1"></i>
        说明：表格横向展示各个热点在不同时间点的排名变化。
        <i class="bi bi-arrow-up text-success"></i> 排名上升，
        <i class="bi bi-arrow-down text-danger"></i> 排名下降，
        <i class="bi bi-dash text-secondary"></i> 排名不变
    </div>`;
    
    container.innerHTML = html;
}

function renderTopicSelector() {
    const selector = document.getElementById('topicSelector');
    
    if (!currentData || !currentData.chart_data || currentData.chart_data.length === 0) {
        selector.innerHTML = '<option value="">暂无数据</option>';
        return;
    }
    
    const chartData = currentData.chart_data;
    
    chartData.sort((a, b) => {
        const avgRankA = a.rank_series.filter(r => r !== null).reduce((sum, r) => sum + r, 0) / (a.rank_series.filter(r => r !== null).length || 1);
        const avgRankB = b.rank_series.filter(r => r !== null).reduce((sum, r) => sum + r, 0) / (b.rank_series.filter(r => r !== null).length || 1);
        return avgRankA - avgRankB;
    });
    
    let html = '';
    chartData.slice(0, 30).forEach((item, idx) => {
        const selected = idx < 5 ? 'selected' : '';
        html += `<option value="${idx}" ${selected}>${item.title}</option>`;
    });
    
    selector.innerHTML = html;
    
    selector.addEventListener('change', renderChart);
}

function renderChart() {
    const container = document.getElementById('chartContainer');
    
    if (!currentData || !currentData.chart_data || currentData.chart_data.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="bi bi-graph-up"></i><p>暂无图表数据</p></div>';
        return;
    }
    
    const chartData = currentData.chart_data;
    const selector = document.getElementById('topicSelector');
    const selectedIndices = Array.from(selector.selectedOptions).map(opt => parseInt(opt.value));
    
    let seriesData = [];
    if (selectedIndices.length > 0) {
        selectedIndices.forEach(idx => {
            if (chartData[idx]) {
                seriesData.push(chartData[idx]);
            }
        });
    } else {
        seriesData = chartData.slice(0, 5);
    }
    
    const colors = [
        '#5470c6', '#91cc75', '#fac858', '#ee6666', '#73c0de',
        '#3ba272', '#fc8452', '#9a60b4', '#ea7ccc', '#48b4bd',
        '#c23531', '#2f4554', '#61a0a8', '#d48265', '#91c7ae',
        '#749f83', '#ca8622', '#bda29a', '#6e7074', '#546570'
    ];
    
    let series = [];
    seriesData.forEach((item, idx) => {
        const data = item.rank_series.map(r => r === null ? null : r);
        series.push({
            name: item.title,
            type: 'line',
            smooth: true,
            symbol: 'circle',
            symbolSize: 8,
            connectNulls: false,
            data: data,
            lineStyle: {
                width: 2,
                color: colors[idx % colors.length]
            },
            itemStyle: {
                color: colors[idx % colors.length]
            }
        });
    });
    
    const timePoints = chartData[0]?.time_points || [];
    
    const option = {
        title: {
            text: '热搜排名变化趋势',
            subtext: 'Y轴为排名，数值越小排名越高',
            left: 'center'
        },
        tooltip: {
            trigger: 'axis',
            axisPointer: {
                type: 'cross'
            },
            formatter: function(params) {
                let result = `<strong>${timePoints[params[0].dataIndex] || '未知'}</strong><br/>`;
                params.forEach(param => {
                    if (param.value !== null && param.value !== undefined) {
                        result += `<span style="color:${param.color}">●</span> ${param.seriesName}: 第${param.value}名<br/>`;
                    }
                });
                return result;
            }
        },
        legend: {
            data: seriesData.map(s => s.title),
            type: 'scroll',
            bottom: 10
        },
        grid: {
            left: '3%',
            right: '4%',
            bottom: '15%',
            top: '15%',
            containLabel: true
        },
        xAxis: {
            type: 'category',
            data: timePoints,
            axisLabel: {
                rotate: 45,
                interval: Math.floor(timePoints.length / 10) || 0
            }
        },
        yAxis: {
            type: 'value',
            inverse: true,
            name: '排名',
            axisLabel: {
                formatter: '第{value}名'
            },
            min: 1,
            splitLine: {
                lineStyle: {
                    type: 'dashed'
                }
            }
        },
        dataZoom: [
            {
                type: 'inside',
                start: 0,
                end: 100
            },
            {
                type: 'slider',
                start: 0,
                end: 100,
                bottom: 80
            }
        ],
        series: series
    };
    
    if (!chart) {
        chart = echarts.init(container);
    }
    
    chart.setOption(option, true);
    
    window.addEventListener('resize', () => {
        chart?.resize();
    });
}

const triggerTabList = document.querySelectorAll('#analysisTabs a');
triggerTabList.forEach(tab => {
    tab.addEventListener('shown.bs.tab', function (e) {
        if (e.target.getAttribute('href') === '#chartTab') {
            setTimeout(() => {
                chart?.resize();
            }, 100);
        }
    });
});

initDateSelector();
loadData();
</script>
{% endblock %}
